go2_nav2_bridge:
  ros__parameters:
    network_interface: eth0
    sport_state_topic: rt/sportmodestate
    unitree_point_cloud_topic: rt/utlidar/cloud
    cmd_vel_topic: /cmd_vel
    cmd_vel_stamped: false
    odom_topic: /unitree_go2/odom
    imu_topic: /go2/imu
    ros_point_cloud_topic: /unitree_go2/lidar/point_cloud
    path_s_topic: /go2/path_s
    odom_frame: map
    base_frame: unitree_go2/base_link
    point_cloud_frame: unitree_go2/lidar_frame
    point_cloud_transform_enabled: true
    # Calibrate these if the Unitree cloud is in the lidar sensor frame instead of base_link.
    point_cloud_xyz_offset: [0.0, 0.0, 0.0]
    point_cloud_rpy_offset: [0.0, 0.0, 0.0]
    publish_tf: true
    publish_point_cloud: true
    stand_on_start: true
    classic_walk_on_start: true
    speed_level_on_start: 1
    cmd_timeout_sec: 0.6
    control_watchdog_hz: 20.0
    log_cmd_vel: true
    log_odom_state: true
    log_point_cloud_roi: true
    point_cloud_roi_log_period_sec: 1.0
    require_fresh_point_cloud_for_motion: true
    point_cloud_motion_timeout_sec: 0.8
    self_filter_enabled: true
    # Keep self-filtering close to the actual robot body. The previous y=+/-0.65m
    # crop could remove a wall near the robot side and hide side-collision risk.
    self_filter_boxes: [-0.45, 0.45, -0.48, 0.48, -0.30, 0.90,
                        0.45, 0.65, -0.18, 0.18, -0.30, 0.90]
    max_vx_mps: 0.30
    max_vy_mps: 0.08
    max_wz_radps: 0.45

controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 12.0
    costmap_update_timeout: 2.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 1.0
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.10
      movement_time_allowance: 20.0
    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.70
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: false
      min_vel_x: 0.10
      min_vel_y: -0.06
      max_vel_x: 0.30
      max_vel_y: 0.06
      max_vel_theta: 0.45
      min_speed_xy: 0.10
      max_speed_xy: 0.31
      min_speed_theta: 0.0
      acc_lim_x: 0.35
      acc_lim_y: 0.12
      acc_lim_theta: 0.55
      decel_lim_x: -0.45
      decel_lim_y: -0.18
      decel_lim_theta: -0.65
      vx_samples: 8
      vy_samples: 5
      vtheta_samples: 15
      sim_time: 1.4
      linear_granularity: 0.08
      angular_granularity: 0.04
      transform_tolerance: 0.3
      xy_goal_tolerance: 0.25
      trans_stopped_velocity: 0.04
      short_circuit_trajectory_evaluation: true
      stateful: true
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      BaseObstacle.scale: 18.0
      PathAlign.scale: 9.0
      PathAlign.forward_point_distance: 0.35
      GoalAlign.scale: 6.0
      GoalAlign.forward_point_distance: 0.35
      PathDist.scale: 10.0
      GoalDist.scale: 8.0
      RotateToGoal.scale: 6.0
      RotateToGoal.slowing_factor: 4.0
      RotateToGoal.lookahead_time: -1.0

planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 2.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner/SmacPlanner2D"
      tolerance: 0.60
      allow_unknown: true
      downsample_costmap: false
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 3.0
      cost_travel_multiplier: 1.8
      use_final_approach_orientation: false

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: map
      robot_base_frame: unitree_go2/base_link
      update_frequency: 3.0
      publish_frequency: 1.5
      rolling_window: true
      track_unknown_space: false
      width: 12
      height: 8
      resolution: 0.08
      footprint: "[[0.45, 0.34], [0.45, -0.34], [-0.45, -0.34], [-0.45, 0.34]]"
      footprint_padding: 0.10
      plugins: ["voxel_layer", "inflation_layer"]
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        footprint_clearing_enabled: true
        publish_voxel_map: true
        origin_z: -0.20
        z_resolution: 0.08
        z_voxels: 16
        min_obstacle_height: 0.03
        max_obstacle_height: 1.20
        unknown_threshold: 15
        mark_threshold: 0
        combination_method: 1
        observation_sources: go2_cloud
        go2_cloud:
          topic: /unitree_go2/lidar/point_cloud
          data_type: "PointCloud2"
          marking: true
          clearing: true
          min_obstacle_height: 0.03
          max_obstacle_height: 1.20
          obstacle_min_range: 0.32
          obstacle_max_range: 5.5
          raytrace_min_range: 0.28
          raytrace_max_range: 6.0
          expected_update_rate: 0.25
          observation_persistence: 0.35
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.60
        cost_scaling_factor: 4.0
      always_send_full_costmap: true

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: map
      robot_base_frame: unitree_go2/base_link
      update_frequency: 10.0
      publish_frequency: 5.0
      rolling_window: true
      track_unknown_space: false
      width: 7
      height: 5
      resolution: 0.05
      footprint: "[[0.45, 0.34], [0.45, -0.34], [-0.45, -0.34], [-0.45, 0.34]]"
      footprint_padding: 0.10
      plugins: ["voxel_layer", "inflation_layer"]
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        footprint_clearing_enabled: true
        publish_voxel_map: true
        origin_z: -0.20
        z_resolution: 0.06
        z_voxels: 16
        min_obstacle_height: 0.03
        max_obstacle_height: 1.20
        unknown_threshold: 15
        mark_threshold: 0
        combination_method: 1
        observation_sources: go2_cloud
        go2_cloud:
          topic: /unitree_go2/lidar/point_cloud
          data_type: "PointCloud2"
          marking: true
          clearing: true
          min_obstacle_height: 0.03
          max_obstacle_height: 1.20
          obstacle_min_range: 0.32
          obstacle_max_range: 4.5
          raytrace_min_range: 0.28
          raytrace_max_range: 5.0
          expected_update_rate: 0.20
          observation_persistence: 0.45
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.62
        cost_scaling_factor: 3.8
      always_send_full_costmap: true

velocity_smoother:
  ros__parameters:
    use_sim_time: true
    smoothing_frequency: 25.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [0.30, 0.06, 0.45]
    min_velocity: [0.0, -0.06, -0.45]
    max_accel: [0.35, 0.12, 0.55]
    max_decel: [-0.45, -0.18, -0.65]
    odom_topic: /unitree_go2/odom
    odom_duration: 0.2
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 0.5
    enable_stamped_cmd_vel: false

collision_monitor:
  ros__parameters:
    use_sim_time: true
    enabled: true
    base_frame_id: unitree_go2/base_link
    odom_frame_id: map
    cmd_vel_in_topic: /cmd_vel_smoothed
    cmd_vel_out_topic: /unitree_go2/cmd_vel
    state_topic: /collision_monitor_state
    transform_tolerance: 0.3
    source_timeout: 0.8
    base_shift_correction: true
    stop_pub_timeout: 1.0
    enable_stamped_cmd_vel: false
    # Normal avoidance is the 3D voxel local costmap. Collision monitor remains
    # only as a last-resort front emergency stop for imminent contact.
    polygons: ["FrontEmergencyStop", "FrontSlow"]
    FrontEmergencyStop:
      type: "polygon"
      points: [0.58, 0.20, 0.58, -0.20, 0.24, -0.20, 0.24, 0.20]
      action_type: "stop"
      max_points: 12
      visualize: true
      polygon_pub_topic: /go2/front_emergency_stop_zone
      enabled: true
    FrontSlow:
      type: "polygon"
      points: [1.15, 0.42, 1.15, -0.42, 0.25, -0.42, 0.25, 0.42]
      action_type: "slowdown"
      max_points: 18
      slowdown_ratio: 0.45
      visualize: true
      polygon_pub_topic: /go2/front_slow_zone
      enabled: true
    observation_sources: ["go2_cloud"]
    go2_cloud:
      type: "pointcloud"
      topic: /unitree_go2/lidar/point_cloud
      min_height: 0.03
      max_height: 1.20
      use_global_height: false
      enabled: true

bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: unitree_go2/base_link
    odom_topic: /unitree_go2/odom
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    navigators: ["navigate_to_pose"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator/NavigateToPoseNavigator"
    # Humble's default tree replans during navigation and uses recovery behaviors.
    # That is the Nav2-native path for real-time obstacle avoidance.
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_assisted_teleop_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_drive_on_heading_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_truncate_path_local_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_path_expiring_timer_condition
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_goal_updated_controller_bt_node
      - nav2_is_battery_low_condition_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_controller_cancel_bt_node
      - nav2_path_longer_on_approach_bt_node
      - nav2_wait_cancel_bt_node
      - nav2_spin_cancel_bt_node
      - nav2_back_up_cancel_bt_node
      - nav2_assisted_teleop_cancel_bt_node

behavior_server:
  ros__parameters:
    use_sim_time: true
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    global_frame: map
    robot_base_frame: unitree_go2/base_link
    transform_tolerance: 0.1
    simulate_ahead_time: 1.0
    max_rotational_vel: 0.35
    min_rotational_vel: 0.10
    rotational_acc_lim: 0.50

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: true
    autostart: true
    node_names: ["planner_server", "controller_server", "velocity_smoother", "collision_monitor"]

nav2_straight_path_client:
  ros__parameters:
    distance_m: 3.0
    goal_lateral_offset_m: 0.0
    auto_lateral_offsets_m: [0.0, 0.6, -0.6, 1.0, -1.0]
    path_resolution_m: 0.10
    odom_frame: map
    base_frame: unitree_go2/base_link
    controller_id: FollowPath
    goal_checker_id: general_goal_checker
    progress_checker_id: progress_checker
    path_handler_id: ""
    action_name: follow_path
    use_navigate_to_pose: false
    navigate_to_pose_action_name: navigate_to_pose
    use_planner: true
    planner_action_name: compute_path_to_pose
    planner_id: GridBased
    finish_on_path_s: false
    path_s_topic: /go2/path_s
    plan_only: false
    server_timeout_sec: 20.0
    tf_timeout_sec: 10.0
